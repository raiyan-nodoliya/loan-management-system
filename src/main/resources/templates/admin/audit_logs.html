<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Admin Dashboard - LoanHub</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">

    <link rel="stylesheet" th:href="@{/css/admin.css}"/>
</head>

<body class="adm-page">

<div class="adm-overlay" id="admOverlay"></div>

<div class="adm-layout">

    <div th:replace="~{fragments/admin_header :: navbarAdmin}"></div>

    <main class="adm-content">
        <div class="adm-mobbar">
            <button class="adm-mobbtn" id="admMobBtn">☰ Open Admin Menu</button>
        </div>

        <section class="adm-topbar">
            <div class="adm-topbar-row">
                <div>
                    <h1 class="adm-h-title">Audit Logs</h1>
                    <p class="adm-h-sub">Track admin changes and staff operations</p>
                </div>
                <div class="adm-actions">
                    <input class="adm-search" placeholder="Search logs..." />
                    <div class="adm-user" id="admUser">
                        <button class="adm-user-btn" id="admUserBtn">Admin ▾</button>
                        <div class="adm-user-menu">
                            <a href="/admin/settings">⚙ Settings</a>
                            <a href="/logout">🚪 Logout</a>
                        </div>
                    </div>
                </div>
            </div>
        </section>

        <section class="adm-card adm-card-pad adm-mt-16">
            <div class="adm-sec-head">
                <div>
                    <h3>Logs</h3>
                    <p>Who did what & when</p>
                </div>
                <button class="adm-btn">Export</button>
            </div>

            <div class="adm-mt-12">
                <table class="adm-table">
                    <thead>
                    <tr>
                        <th>Date/Time</th>
                        <th>Actor</th>
                        <th>Action</th>
                        <th>Module</th>
                        <th>Result</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="l : ${recentLogs}">
                        <td th:text="${#temporals.format(l.createdAt, 'hh:mm a')}">10:12 AM</td>
                        <td th:text="${l.action}">Action</td>
                        <td th:text="${l.actorEmail}">User</td>
                        <td th:text="${l.module}">Module</td>
                        <td>
    <span class="adm-pill"
          th:classappend="${l.status} == 'SUCCESS' ? ' adm-pill-approved' : ' adm-pill-risk'"
          th:text="${l.status}">
    </span>
                        </td>
                    </tr>

                    <tr th:if="${#lists.isEmpty(recentLogs)}">
                        <td colspan="5" style="text-align:center; padding:14px;">No activity yet</td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </section>

    </main>
</div>

<script th:src="@{/js/admin.js}"></script>
</body>
</html>
