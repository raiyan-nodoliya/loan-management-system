<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Admin Dashboard - LoanHub</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">

    <link rel="stylesheet" th:href="@{/css/admin.css}"/>
</head>

<body class="adm-page">

<div class="adm-overlay" id="admOverlay"></div>

<div class="adm-layout">

    <div th:replace="~{fragments/admin_header :: navbarAdmin}"></div>




            <main class="adm-content">

                <!-- Mobile open button -->
                <div class="adm-mobbar">
                    <button class="adm-mobbtn" id="admMobBtn">☰ Open Admin Menu</button>
                </div>

                <!-- Topbar -->
                <section class="adm-topbar">
                    <div class="adm-topbar-row">
                        <div>
                            <h1 class="adm-h-title">Admin Dashboard</h1>
                            <p class="adm-h-sub">Create staff, manage branches, configure rules & EMI schedules.</p>
                        </div>

                        <div class="adm-actions">
                            <input class="adm-search" placeholder="Search (users / app no)..." />

                            <div class="adm-user" id="admUser">
                                <button class="adm-user-btn" id="admUserBtn">Admin ▾</button>
                                <div class="adm-user-menu">
                                    <a href="/admin/settings">⚙ Settings</a>
                                    <a href="/logout">🚪 Logout</a>
                                </div>
                            </div>
                        </div>
                    </div>
                </section>

                <!-- KPI cards -->
                <section class="adm-grid-4">
                    <div class="adm-card adm-card-pad">
                        <div class="adm-kpi">
                            <div>
                                <small>Total Officers</small>
                                <b th:text="${totalOfficers}">0</b>
                            </div>
                            <div class="adm-kpi-ico">👤</div>
                        </div>
                    </div>

<!--                    <div class="adm-card adm-card-pad">-->
<!--                        <div class="adm-kpi">-->
<!--                            <div>-->
<!--                                <small>Total Branches</small>-->
<!--                                <b>6</b>-->
<!--                            </div>-->
<!--                            <div class="adm-kpi-ico">🏢</div>-->
<!--                        </div>-->
<!--                    </div>-->

                    <div class="adm-card adm-card-pad">
                        <div class="adm-kpi">
                            <div>
                                <small>Rules Active</small>
                                <b th:text="${rulesActive}">0</b>
                            </div>
                            <div class="adm-kpi-ico">📜</div>
                        </div>
                    </div>

                    <div class="adm-card adm-card-pad">
                        <div class="adm-kpi">
                            <div>
                                <small>Pending Requests</small>
                                <b th:text="${pendingRequests}">0</b>
                            </div>
                            <div class="adm-kpi-ico">⏳</div>
                        </div>
                    </div>
                </section>

                <!-- Recent activity -->
                <section class="adm-card adm-card-pad adm-mt-16">
                    <div class="adm-sec-head">
                        <div>
                            <h3>Recent Activity</h3>
                            <p>Last updates in admin operations</p>
                        </div>
                        <button class="adm-btn">View All</button>
                    </div>

                    <div class="adm-mt-12">
                        <table class="adm-table">
                            <thead>
                            <tr>
                                <th>Time</th>
                                <th>Action</th>
                                <th>User</th>
                                <th>Module</th>
                                <th>Status</th>
                            </tr>
                            </thead>
                            <tbody>
                            <tr th:each="l : ${recentLogs}">
                                <td th:text="${#temporals.format(l.createdAt, 'hh:mm a')}">10:12 AM</td>
                                <td th:text="${l.action}">Action</td>
                                <td th:text="${l.actorEmail}">User</td>
                                <td th:text="${l.module}">Module</td>
                                <td>
    <span class="adm-pill"
          th:classappend="${l.status} == 'SUCCESS' ? ' adm-pill-approved' : ' adm-pill-risk'"
          th:text="${l.status}">
    </span>
                                </td>
                            </tr>

                            <tr th:if="${#lists.isEmpty(recentLogs)}">
                                <td colspan="5" style="text-align:center; padding:14px;">No activity yet</td>
                            </tr>
                            </tbody>
                        </table>
                    </div>
                </section>

            </main>

        </div>

    <script th:src="@{/js/admin.js}"></script>
</body>
</html>
