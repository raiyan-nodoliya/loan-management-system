<!-- admin/loan_types.html -->

<div th:fragment="pageContent">

    <!-- Topbar -->
    <section class="adm-topbar">
        <div class="adm-topbar-row">
            <div>
                <h1 class="adm-h-title">Loan Types</h1>
                <p class="adm-h-sub">Create loan types (normalized master table)</p>
            </div>
        </div>
    </section>

    <!-- Alerts -->
    <div class="adm-mt-12" th:if="${success}">
        <div class="adm-alert adm-alert-success" th:text="${success}">Saved</div>
    </div>
    <div class="adm-mt-12" th:if="${error}">
        <div class="adm-alert adm-alert-danger" th:text="${error}">Error</div>
    </div>

    <!-- Create Loan Type -->
    <section class="adm-card adm-card-pad adm-mt-16">
        <div class="adm-sec-head">
            <div>
                <h3>Create Loan Type</h3>
                <p>ID auto-generate hoga. Code + name add karo.</p>
            </div>
        </div>

        <form th:action="@{/admin/settings/loan-types}" method="post">
            <div class="adm-field">
                <label>Loan Type Code <span style="color:red">*</span></label>
                <input class="adm-input"
                       type="text"
                       name="loanTypeCode"
                       placeholder="e.g. HOME_LOAN"
                       maxlength="50"
                       pattern="[A-Za-z0-9_ ]+"
                       required/>
            </div>

            <div class="adm-field">
                <label>Loan Type Name <span style="color:red">*</span></label>
                <input class="adm-input"
                       type="text"
                       name="loanTypeName"
                       placeholder="e.g. Home Loan"
                       maxlength="100"
                       required/>
            </div>

            <div class="adm-form-actions">
                <button type="reset" class="adm-btn">Reset</button>
                <button type="submit" class="adm-btn adm-btn-yellow">Create Loan Type</button>
            </div>
        </form>
    </section>

    <!-- Existing Loan Types -->
    <!-- Existing Loan Types -->
    <section class="adm-card adm-card-pad adm-mt-16">
        <div class="adm-sec-head">
            <div>
                <h3>Existing Loan Types</h3>
                <p>loan_type_id + code + name + active stored</p>
            </div>
        </div>

        <div class="adm-mt-12">
            <table class="adm-table">
                <thead>
                <tr>
                    <th>ID</th>
                    <th>Code</th>
                    <th>Name</th>
                    <th>Status</th>
                    <th>Action</th>
                </tr>
                </thead>

                <tbody>

                <!-- ✅ SAFE loop -->
                <th:block th:if="${loanTypes != null and !#lists.isEmpty(loanTypes)}"
                          th:each="x : ${loanTypes}">
                    <tr>
                        <td th:text="${x.loanTypeId}">1</td>
                        <td th:text="${x.loanTypeCode}">HOME_LOAN</td>
                        <td th:text="${x.loanTypeName}">Home Loan</td>

                        <td>
                        <span class="adm-pill"
                              th:classappend="${x.active} ? ' adm-pill-approved' : ' adm-pill-risk'"
                              th:text="${x.active} ? 'Active' : 'Disabled'">
                        </span>
                        </td>

                        <td>
                            <form th:action="@{/admin/settings/loan-types/{id}/toggle(id=${x.loanTypeId})}"
                                  method="post">
                                <button type="submit" class="adm-btn"
                                        th:text="${x.active} ? 'Disable' : 'Enable'">
                                    Toggle
                                </button>
                            </form>
                        </td>
                    </tr>
                </th:block>

                <!-- ✅ fallback -->
                <tr th:if="${loanTypes == null or #lists.isEmpty(loanTypes)}">
                    <td colspan="5" style="text-align:center;">No data found.</td>
                </tr>

                </tbody>
            </table>
        </div>
    </section>

</div>
