<!-- admin/roles.html -->

<div th:fragment="pageContent">

    <section class="adm-topbar">
        <div class="adm-topbar-row">
            <div>
                <h1 class="adm-h-title">Roles</h1>
                <p class="adm-h-sub">Create roles (normalized master table)</p>
            </div>
        </div>
    </section>

    <!-- Flash messages (optional if you use success/error) -->
    <div class="adm-mt-12" th:if="${success}">
        <div class="adm-alert adm-alert-success" th:text="${success}">Saved</div>
    </div>
    <div class="adm-mt-12" th:if="${error}">
        <div class="adm-alert adm-alert-danger" th:text="${error}">Error</div>
    </div>

    <!-- Create Role -->
    <section class="adm-card adm-card-pad adm-mt-16">
        <div class="adm-sec-head">
            <div>
                <h3>Create Role</h3>
                <p>ID auto-generate hoga. Sirf role name add karo.</p>
            </div>
        </div>

        <form th:action="@{/admin/settings/roles}" method="post">
            <div class="adm-field">
                <label>Role Name <span style="color:red">*</span></label>
                <input class="adm-input"
                       type="text"
                       name="roleName"
                       placeholder="e.g. BRANCH_MANAGER"
                       maxlength="50"
                       pattern="[A-Za-z0-9_ ]+"
                       required/>
            </div>

            <div class="adm-form-actions">
                <button type="reset" class="adm-btn">Reset</button>
                <button type="submit" class="adm-btn adm-btn-yellow">Create Role</button>
            </div>
        </form>
    </section>

    <!-- Existing Roles -->
    <section class="adm-card adm-card-pad adm-mt-16">
        <div class="adm-sec-head">
            <div>
                <h3>Existing Roles</h3>
                <p>Only role_id + role_name stored</p>
            </div>
        </div>

        <div class="adm-mt-12">
            <table class="adm-table">
                <thead>
                <tr>
                    <th>Role ID</th>
                    <th>Role Name</th>
                    <th>Status</th>
                    <th>Action</th>
                </tr>
                </thead>

                <tbody>
                <tr th:each="r : ${roles}">
                    <td th:text="${r.roleId}">1</td>
                    <td th:text="${r.roleName}">BRANCH_MANAGER</td>

                    <td>
                        <span class="adm-pill"
                              th:classappend="${r.active} ? ' adm-pill-approved' : ' adm-pill-risk'"
                              th:text="${r.active} ? 'Active' : 'Disabled'">
                        </span>
                    </td>

                    <td>
                        <form th:action="@{/admin/settings/roles/{id}/toggle(id=${r.roleId})}" method="post">
                            <!-- CSRF (agar enabled ho to uncomment) -->
                            <!-- <input type="hidden" th:if="${_csrf != null}" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/> -->

                            <button class="adm-btn" type="submit"
                                    th:text="${r.active} ? 'Disable' : 'Enable'">
                                Toggle
                            </button>
                        </form>
                    </td>
                </tr>

                <tr th:if="${roles == null or #lists.isEmpty(roles)}">
                    <td colspan="4" style="text-align:center;">No roles found.</td>
                </tr>
                </tbody>

            </table>
        </div>
    </section>

</div>
