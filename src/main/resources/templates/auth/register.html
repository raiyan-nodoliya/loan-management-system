<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LoanHub - Customer Registration</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
    <link rel="stylesheet" th:href="@{/css/loanhub.css}">

    <style>
        .auth-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 18px 18px;
        }

        .full-width {
            grid-column: 1 / -1;
        }

        .input-error {
            border: 1px solid #dc2626 !important;
            box-shadow: 0 0 0 3px rgba(220, 38, 38, 0.08);
        }

        @media (max-width: 768px) {
            .auth-grid {
                grid-template-columns: 1fr;
            }

            .full-width {
                grid-column: auto;
            }
        }
    </style>
</head>

<body>

<div th:replace="~{fragments/header :: navbarSection}"></div>

<section class="hero">
    <div class="container hero-inner">
        <h1 class="hero-title">Customer Registration</h1>
        <p class="hero-sub">Create your account to apply for loans</p>
    </div>
</section>

<section class="section page-bg">
    <div class="container">
        <div class="auth-wrap">
            <div class="contact-card auth-card">

                <form class="contact-form" th:action="@{/register}" method="post">

                    <div id="toastData" th:data-msg="${toastMessage}" th:data-type="${toastType}"></div>

                    <div th:if="${errors != null and errors['form'] != null}"
                         style="color:#dc2626; font-weight:600; margin-bottom:10px;"
                         th:text="${errors['form']}"></div>

                    <div class="auth-grid">

                        <div class="c-field">
                            <label>Full Name</label>
                            <input type="text"
                                   name="fullName"
                                   placeholder="Enter your full name"
                                   th:value="${fullName}"
                                   th:classappend="${errors != null and errors['fullName'] != null} ? ' input-error' : ''"
                                   required>
                            <small th:if="${errors != null and errors['fullName'] != null}"
                                   style="color:#dc2626;"
                                   th:text="${errors['fullName']}"></small>
                        </div>

                        <div class="c-field">
                            <label>Email</label>
                            <input type="email"
                                   name="email"
                                   placeholder="Enter your email address"
                                   th:value="${email}"
                                   th:classappend="${errors != null and errors['email'] != null} ? ' input-error' : ''"
                                   required>
                            <small th:if="${errors != null and errors['email'] != null}"
                                   style="color:#dc2626;"
                                   th:text="${errors['email']}"></small>
                        </div>

                        <div class="c-field">
                            <label>Phone</label>
                            <input type="tel"
                                   name="phone"
                                   placeholder="Enter 10-digit mobile number"
                                   th:value="${phone}"
                                   th:classappend="${errors != null and errors['phone'] != null} ? ' input-error' : ''"
                                   required>
                            <small th:if="${errors != null and errors['phone'] != null}"
                                   style="color:#dc2626;"
                                   th:text="${errors['phone']}"></small>
                        </div>

                        <div class="c-field">
                            <label>Date of Birth</label>
                            <input type="date"
                                   name="dob"
                                   th:value="${dob}"
                                   th:classappend="${errors != null and errors['dob'] != null} ? ' input-error' : ''"
                                   required>
                            <small th:if="${errors != null and errors['dob'] != null}"
                                   style="color:#dc2626;"
                                   th:text="${errors['dob']}"></small>
                        </div>

                        <div class="c-field">
                            <label>Gender</label>
                            <select name="gender"
                                    th:classappend="${errors != null and errors['gender'] != null} ? ' input-error' : ''"
                                    required>

                                <option value="">Select Gender</option>
                                <option value="MALE" th:selected="${gender == 'MALE'}">Male</option>
                                <option value="FEMALE" th:selected="${gender == 'FEMALE'}">Female</option>
                                <option value="OTHER" th:selected="${gender == 'OTHER'}">Other</option>

                            </select>

                            <small th:if="${errors != null and errors['gender'] != null}"
                                   style="color:#dc2626;"
                                   th:text="${errors['gender']}"></small>
                        </div>

                        <div class="c-field">
                            <label>City</label>
                            <input type="text"
                                   name="city"
                                   placeholder="Enter your city"
                                   th:value="${city}"
                                   th:classappend="${errors != null and errors['city'] != null} ? ' input-error' : ''"
                                   required>
                            <small th:if="${errors != null and errors['city'] != null}"
                                   style="color:#dc2626;"
                                   th:text="${errors['city']}"></small>
                        </div>

                        <div class="c-field">
                            <label>State</label>
                            <input type="text"
                                   name="state"
                                   placeholder="Enter your state"
                                   th:value="${state}"
                                   th:classappend="${errors != null and errors['state'] != null} ? ' input-error' : ''"
                                   required>
                            <small th:if="${errors != null and errors['state'] != null}"
                                   style="color:#dc2626;"
                                   th:text="${errors['state']}"></small>
                        </div>

                        <div class="c-field">
                            <label>Pincode</label>
                            <input type="text"
                                   name="pincode"
                                   placeholder="Enter your pincode"
                                   th:value="${pincode}"
                                   th:classappend="${errors != null and errors['pincode'] != null} ? ' input-error' : ''"
                                   required>
                            <small th:if="${errors != null and errors['pincode'] != null}"
                                   style="color:#dc2626;"
                                   th:text="${errors['pincode']}"></small>
                        </div>

                        <div class="c-field">
                            <label>Password</label>
                            <input type="password"
                                   name="password"
                                   placeholder="Enter your password"
                                   th:classappend="${errors != null and errors['password'] != null} ? ' input-error' : ''"
                                   required>
                            <small th:if="${errors != null and errors['password'] != null}"
                                   style="color:#dc2626;"
                                   th:text="${errors['password']}"></small>
                        </div>

                        <div class="c-field">
                            <label>Confirm Password</label>
                            <input type="password"
                                   name="confirmPassword"
                                   placeholder="Re-enter your password"
                                   th:classappend="${errors != null and errors['confirmPassword'] != null} ? ' input-error' : ''"
                                   required>
                            <small th:if="${errors != null and errors['confirmPassword'] != null}"
                                   style="color:#dc2626;"
                                   th:text="${errors['confirmPassword']}"></small>
                        </div>

                        <div class="c-field full-width">
                            <label>Address</label>
                            <textarea name="address"
                                      rows="4"
                                      placeholder="Enter your full address"
                                      th:classappend="${errors != null and errors['address'] != null} ? ' input-error' : ''"
                                      required>[[${address}]]</textarea>
                            <small th:if="${errors != null and errors['address'] != null}"
                                   style="color:#dc2626;"
                                   th:text="${errors['address']}"></small>
                        </div>
                    </div>

                    <button class="btn btn-yellow auth-btn" type="submit" style="margin-top:20px;">
                        Register
                    </button>

                    <div class="auth-links auth-links-center">
                        <div class="auth-muted">
                            Already have an account?
                            <a class="auth-link" th:href="@{/customer_login}">Login here</a>
                        </div>
                    </div>
                </form>

            </div>
        </div>
    </div>
</section>

<div th:replace="~{fragments/footer :: footerSection}"></div>

<script th:src="@{/js/loanhub.js}"></script>
</body>
</html>
