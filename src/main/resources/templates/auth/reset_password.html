<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - LoanHub</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/loanhub.css}">
</head>
<body>

<div th:replace="~{fragments/header :: navbarSection}"></div>

<section class="hero">
    <div class="container hero-inner">
        <h1 class="hero-title">Reset Password</h1>
        <p class="hero-sub">Set your new password</p>
    </div>
</section>

<section class="section page-bg">
    <div class="container">
        <div class="auth-wrap">
            <div class="contact-card auth-card">

                <form class="contact-form" th:action="@{/auth/reset-password}" method="post">

                    <div th:if="${error != null}"
                         style="color:#dc2626; font-weight:600; margin-bottom:12px;"
                         th:text="${error}"></div>

                    <div class="c-field">
                        <label>Email</label>
                        <input type="email" th:value="${email}" readonly>
                    </div>

                    <div class="c-field">
                        <label>New Password</label>
                        <input type="password"
                               name="password"
                               placeholder="Enter new password"
                               required>
                    </div>

                    <div class="c-field">
                        <label>Confirm Password</label>
                        <input type="password"
                               name="confirmPassword"
                               placeholder="Re-enter new password"
                               required>
                    </div>

                    <button class="btn btn-yellow auth-btn" type="submit">Update Password</button>
                </form>

            </div>
        </div>
    </div>
</section>

<div th:replace="~{fragments/footer :: footerSection}"></div>
<script th:src="@{/js/loanhub.js}"></script>
</body>
</html>
