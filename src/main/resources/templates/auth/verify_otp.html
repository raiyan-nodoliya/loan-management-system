<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verify OTP - LoanHub</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/loanhub.css}">
</head>
<body>

<div th:replace="~{fragments/header :: navbarSection}"></div>

<section class="hero">
    <div class="container hero-inner">
        <h1 class="hero-title">Verify OTP</h1>
        <p class="hero-sub">Enter the OTP sent to your email</p>
    </div>
</section>

<section class="section page-bg">
    <div class="container">
        <div class="auth-wrap">
            <div class="contact-card auth-card">

                <form class="contact-form" th:action="@{/auth/verify-otp}" method="post">

                    <div th:if="${error != null}"
                         style="color:#dc2626; font-weight:600; margin-bottom:12px;"
                         th:text="${error}"></div>

                    <div th:if="${success != null}"
                         style="color:#16a34a; font-weight:600; margin-bottom:12px;"
                         th:text="${success}"></div>

                    <div class="c-field">
                        <label>Email</label>
                        <input type="email" th:value="${email}" readonly>
                    </div>

                    <div class="c-field">
                        <label>OTP</label>
                        <input type="text"
                               name="otp"
                               maxlength="6"
                               placeholder="Enter 6-digit OTP"
                               required>
                    </div>

                    <button class="btn btn-yellow auth-btn" type="submit">Verify OTP</button>
                </form>

                <form th:action="@{/auth/resend-otp}" method="post" style="margin-top:14px;">
                    <button type="submit" class="btn" style="width:100%; border:1px solid #d1d5db;">
                        Resend OTP
                    </button>
                </form>

            </div>
        </div>
    </div>
</section>

<div th:replace="~{fragments/footer :: footerSection}"></div>
<script th:src="@{/js/loanhub.js}"></script>
</body>
</html>
