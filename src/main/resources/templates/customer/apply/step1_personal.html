<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LoanHub - Home</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
    <link rel="stylesheet" th:href="@{/css/loanhub.css}">
    <link rel="stylesheet" th:href="@{/css/customer_dashboard.css}">
</head>

<body>


<div th:replace="~{fragments/customerNavbarSection :: customerNavbarSection}"></div>

<section class="db-hero">
    <div class="db-hero-inner">
        <h1 class="db-hero-title">Apply for Loan</h1>
        <p class="db-hero-sub">Step 1 of 4: Personal Details</p>
    </div>
</section>

<div class="db-wrap">

    <div class="db-stepbar">
        <div class="db-step active"><span class="db-step-dot">1</span> Personal Details</div>
        <div class="db-step-line muted"></div>
        <div class="db-step"><span class="db-step-dot">2</span> Loan Details</div>
        <div class="db-step-line muted"></div>
        <div class="db-step"><span class="db-step-dot">3</span> Income & Employment</div>
        <div class="db-step-line muted"></div>
        <div class="db-step"><span class="db-step-dot">4</span> Documents & Submit</div>
    </div>

    <div class="db-card db-card-pad" style="max-width: 640px; margin: 12px auto 0;">
        <form th:action="@{/apply/step1_personal}" method="post">
            <div class="db-form-grid-2">
                <div class="db-field">
                    <label>Full Name</label>
                    <input class="db-input" name="name" th:value="${customer.name}" required />
                </div>
                <div class="db-field">
                    <label>Email</label>
                    <input class="db-input" th:value="${customer.email}" readonly />
                </div>
                <div class="db-field">
                    <label>Phone</label>
                    <input class="db-input" name="phone" th:value="${customer.phone}" />
                </div>
                <div class="db-field">
                    <label>Date of Birth</label>
                    <input class="db-input" type="date" name="dob" th:value="${customer.dob}" />
                </div>
            </div>

            <div class="db-field db-mt-14">
                <label>Address</label>
                <textarea class="db-textarea" name="address" th:text="${customer.address}"></textarea>
            </div>

            <div class="db-form-actions">
                <button class="db-btn db-btn-disabled" type="button"><i class="fa-solid fa-arrow-left"></i> Back</button>
                <button class="db-btn db-btn-yellow" type="submit">
                    Next <i class="fa-solid fa-arrow-right"></i>
                </button>
            </div>
        </form>
    </div>
</div>

<!-- ✅ FOOTER (your bug is here: missing quote + bracket) -->
<div th:replace="~{fragments/footer :: footerSection}"></div>

<!-- ✅ JS should be at end -->
<script th:src="@{/js/loanhub.js}"></script>
<script th:src="@{/js/customer_dashboard.js}"></script>
</body>
</html>
