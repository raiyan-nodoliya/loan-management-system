<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LoanHub - Home</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
    <link rel="stylesheet" th:href="@{/css/loanhub.css}">
    <link rel="stylesheet" th:href="@{/css/customer_dashboard.css}">
</head>

<body>

<div th:replace="~{fragments/customerNavbarSection :: customerNavbarSection}"></div>

<section class="db-hero">
    <div class="db-hero-inner">
        <h1 class="db-hero-title">Apply for Loan</h1>
        <p class="db-hero-sub">Step 3 of 4: Income & Employment</p>
    </div>
</section>

<div class="db-wrap">

    <div class="db-stepbar">
        <div class="db-step"><span class="db-step-dot">1</span> Personal Details</div>
        <div class="db-step-line"></div>
        <div class="db-step"><span class="db-step-dot">2</span> Loan Details</div>
        <div class="db-step-line"></div>
        <div class="db-step active"><span class="db-step-dot">3</span> Income & Employment</div>
        <div class="db-step-line muted"></div>
        <div class="db-step"><span class="db-step-dot">4</span> Documents & Submit</div>
    </div>

    <div class="db-card db-card-pad" style="max-width: 640px; margin: 12px auto 0;">
        <form th:action="@{/apply/step3_income}" method="post">
            <div class="db-form-grid-2">
                <div class="db-field">
                    <label>Employer / Business Name</label>
                    <input class="db-input"
                           name="employerName"
                           placeholder="Enter employer or business name"
                           th:value="${employerName}" />
                    <small class="db-err" th:if="${employerNameError}" th:text="${employerNameError}"></small>
                </div>

                <div class="db-field">
                    <label>Designation</label>
                    <input class="db-input"
                           name="designation"
                           placeholder="Enter designation"
                           th:value="${designation}" />
                    <small class="db-err" th:if="${designationError}" th:text="${designationError}"></small>
                </div>

                <div class="db-field">
                    <label>Monthly Income (₹)</label>
                    <input class="db-input"
                           name="monthlyIncome"
                           type="number"
                           step="0.01"
                           min="0"
                           placeholder="Enter monthly income"
                           th:value="${monthlyIncome}" />
                    <small class="db-err" th:if="${monthlyIncomeError}" th:text="${monthlyIncomeError}"></small>
                </div>

                <div class="db-field">
                    <label>Experience (years)</label>
                    <input class="db-input"
                           name="experienceYears"
                           type="number"
                           min="0"
                           placeholder="Enter experience in years"
                           th:value="${experienceYears}" />
                    <small class="db-err" th:if="${experienceYearsError}" th:text="${experienceYearsError}"></small>
                </div>
            </div>

            <div class="db-form-actions">
                <a class="db-btn" th:href="@{/apply/step2_loan}">
                    <i class="fa-solid fa-arrow-left"></i> Back
                </a>
                <button class="db-btn db-btn-yellow" type="submit">
                    Next <i class="fa-solid fa-arrow-right"></i>
                </button>
            </div>
        </form>
    </div>
</div>

<!-- ✅ FOOTER (your bug is here: missing quote + bracket) -->
<div th:replace="~{fragments/footer :: footerSection}"></div>

<!-- ✅ JS should be at end -->
<script th:src="@{/js/loanhub.js}"></script>
<script th:src="@{/js/customer_dashboard.js}"></script>
</body>
</html>
