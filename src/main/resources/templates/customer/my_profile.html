<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LoanHub - My Profile</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
    <link rel="stylesheet" th:href="@{/css/loanhub.css}">
    <link rel="stylesheet" th:href="@{/css/customer_dashboard.css}">
</head>

<body>

<div th:replace="~{fragments/customerNavbarSection :: customerNavbarSection}"></div>

<div id="toast" style="
    position: fixed; top: 16px; right: 16px; width: 320px;
    background: #ffffff; border-radius: 10px;
    box-shadow: 0 10px 25px rgba(0,0,0,.15);
    display: none; overflow: hidden; z-index: 9999;">
    <div style="display:flex; align-items:center; gap:10px; padding:12px 12px;">
        <div id="toastIcon" style="
        width: 22px; height: 22px; border-radius: 50%;
        display:flex; align-items:center; justify-content:center;
        color:#fff; font-weight:700; font-size:14px;">!</div>
        <div style="flex:1; font-weight:600; color:#111827;">
            <span id="toastText">Message</span>
        </div>
        <button id="toastClose" type="button" style="
        border:none; background:transparent; font-size:18px;
        cursor:pointer; color:#6b7280;">×</button>
    </div>
    <div id="toastBar" style="height:4px; width:0%;"></div>
</div>

<section class="db-hero">
    <div class="db-hero-inner">
        <h1 class="db-hero-title">My Profile</h1>
        <p class="db-hero-sub">Manage your account details</p>
    </div>
</section>

<div class="db-wrap">
    <div class="db-card db-card-pad" style="max-width:700px; margin: 0 auto;">
        <h3 class="db-sec-title" style="margin-bottom:12px;">Personal Information</h3>

        <div id="toastData" th:data-msg="${toastMessage}" th:data-type="${toastType}"></div>

        <form th:action="@{/customer/my_profile}" method="post">
            <div th:if="${errors != null and errors['form'] != null}"
                 style="color:#dc2626; font-weight:600; margin-bottom:10px;"
                 th:text="${errors['form']}"></div>

            <div class="db-form-grid-2">
                <div class="db-field">
                    <label>Full Name</label>
                    <input class="db-input" type="text" name="fullName"
                           th:value="${fullName != null ? fullName : customer.name}"
                           maxlength="100" required/>
                    <small th:if="${errors != null and errors['fullName'] != null}"
                           style="color:#dc2626;"
                           th:text="${errors['fullName']}"></small>
                </div>

                <div class="db-field">
                    <label>Email</label>
                    <input class="db-input" type="email" name="email"
                           th:value="${email != null ? email : customer.email}"
                           maxlength="150" required/>
                    <small th:if="${errors != null and errors['email'] != null}"
                           style="color:#dc2626;"
                           th:text="${errors['email']}"></small>
                </div>

                <div class="db-field">
                    <label>Phone</label>
                    <input class="db-input" type="text" name="phone"
                           th:value="${phone != null ? phone : customer.phone}"
                           maxlength="10"
                           oninput="this.value=this.value.replace(/[^0-9]/g,'').slice(0,10)"
                           required/>
                    <small th:if="${errors != null and errors['phone'] != null}"
                           style="color:#dc2626;"
                           th:text="${errors['phone']}"></small>
                </div>

                <div class="db-field">
                    <label>Date of Birth</label>
                    <input class="db-input" type="date" name="dob"
                           th:value="${dob != null ? dob : customer.dob}"
                           required/>
                    <small th:if="${errors != null and errors['dob'] != null}"
                           style="color:#dc2626;"
                           th:text="${errors['dob']}"></small>
                </div>
            </div>

            <div class="db-field db-mt-14">
                <label>Address</label>
                <input class="db-input" type="text" name="address"
                       th:value="${address != null ? address : customer.address}"
                       maxlength="255" required/>
                <small th:if="${errors != null and errors['address'] != null}"
                       style="color:#dc2626;"
                       th:text="${errors['address']}"></small>
            </div>

            <div class="db-form-grid-2 db-mt-14">
                <div class="db-field">
                    <label>City</label>
                    <input class="db-input" type="text" name="city"
                           th:value="${city != null ? city : customer.city}"
                           maxlength="80" required/>
                    <small th:if="${errors != null and errors['city'] != null}"
                           style="color:#dc2626;"
                           th:text="${errors['city']}"></small>
                </div>

                <div class="db-field">
                    <label>State</label>
                    <input class="db-input" type="text" name="state"
                           th:value="${state != null ? state : customer.state}"
                           maxlength="80" required/>
                    <small th:if="${errors != null and errors['state'] != null}"
                           style="color:#dc2626;"
                           th:text="${errors['state']}"></small>
                </div>
            </div>

            <div class="db-field db-mt-14">
                <label>Pincode</label>
                <input class="db-input" type="text" name="pincode"
                       th:value="${pincode != null ? pincode : customer.pincode}"
                       maxlength="12"
                       oninput="this.value=this.value.replace(/[^0-9]/g,'').slice(0,12)"
                       required/>
                <small th:if="${errors != null and errors['pincode'] != null}"
                       style="color:#dc2626;"
                       th:text="${errors['pincode']}"></small>
            </div>

            <div class="db-mt-14 db-row" style="justify-content:flex-start;">
                <button class="db-btn db-btn-yellow" type="submit">Save Changes</button>
            </div>
        </form>
    </div>
</div>

<div th:replace="~{fragments/footer :: footerSection}"></div>

<script th:src="@{/js/loanhub.js}"></script>
<script th:src="@{/js/customer_dashboard.js}"></script>
</body>
</html>
