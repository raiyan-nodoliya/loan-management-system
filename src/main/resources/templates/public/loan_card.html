<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LoanHub - Home</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
    <link rel="stylesheet" th:href="@{/css/loanhub.css}">
</head>

<body>

<div th:replace="~{fragments/header :: navbarSection}"></div>



<section class="hero">
    <div class="container hero-inner">
        <h1 class="hero-title">Our Loan Products</h1>
        <p class="hero-sub">Plan your loan repayment with our easy calculator</p>
    </div>
</section>


<!-- PRODUCTS -->
<section class="section products" id="products">
    <div class="container">
        <div class="sec-head">
            <h2>Our Loan Products</h2>
            <p>Choose the right loan for your needs</p>
        </div>

        <div class="grid-4">

            <article class="p-card" th:if="${loanTypes == null or #lists.isEmpty(loanTypes)}">
                <div class="p-icon"><i class="fa-solid fa-circle-info"></i></div>
                <h3>No Loan Products</h3>
                <p>Loan products are not available right now.</p>
            </article>

            <th:block th:if="${loanTypes != null and !#lists.isEmpty(loanTypes)}"
                      th:each="x : ${loanTypes}">
                <article class="p-card">
                    <div class="p-icon">
                        <i th:class="${x.loanTypeCode == 'PERSONAL' ? 'fa-regular fa-user' :
                              (x.loanTypeCode == 'HOME' ? 'fa-solid fa-house' :
                              (x.loanTypeCode == 'EDUCATION' ? 'fa-solid fa-graduation-cap' :
                              (x.loanTypeCode == 'VEHICLE' ? 'fa-solid fa-car-side' : 'fa-solid fa-money-bill')))}"></i>
                    </div>

                    <h3 th:text="${x.loanTypeName}">Personal Loan</h3>

                    <p th:text="${x.description != null and !#strings.isEmpty(x.description) ? x.description : 'Flexible loan solution for your needs.'}">
                        Quick funds for your personal needs.
                    </p>

                    <div class="p-meta">
                        <div>
                            <div class="k">Starting rate</div>
                            <div class="v"
                                 th:text="${x.interestRateMin != null ? x.interestRateMin + '% p.a.' : 'N/A'}">
                                10.5% p.a.
                            </div>
                        </div>

                        <div class="right">
                            <div class="k">Max amount</div>
                            <div class="v"
                                 th:text="${x.maxAmount != null ? '₹' + #numbers.formatDecimal(x.maxAmount, 0, 'COMMA', 0, 'POINT') : 'N/A'}">
                                ₹25,00,000
                            </div>
                        </div>
                    </div>

                    <a class="learn" th:href="@{/customer_login}">
                        Learn More <i class="fa-solid fa-arrow-right"></i>
                    </a>
                </article>
            </th:block>

        </div>
    </div>
</section>



<!-- ✅ FOOTER (your bug is here: missing quote + bracket) -->
<div th:replace="~{fragments/footer :: footerSection}"></div>

<!-- ✅ JS should be at end -->
<script th:src="@{/js/loanhub.js}"></script>
</body>
</html>
